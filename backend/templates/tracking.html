{% extends 'base.html' %}

{% block content %}
<div class="text-center mt-4">
    <h2>🛵 Your Order is On The Way!</h2>
    <p class="text-muted">Order #{{ order.id }}</p>

    
    <div style="font-size:60px; margin:30px 0;" id="rider">🛵</div>

   
    <h4>Estimated Delivery Time:</h4>
    <h1 class="text-danger" id="timer">30:00</h1>
    <p class="text-muted">minutes remaining</p>

    <div class="progress mt-3" style="height:20px;">
        <div class="progress-bar bg-danger" id="progress" style="width:0%"></div>
    </div>

    <div class="mt-4">
        <span class="badge bg-secondary me-2">Order Placed ✅</span>
        <span class="badge bg-warning me-2">Preparing 🍳</span>
        <span class="badge bg-danger">On The Way 🛵</span>
    </div>
</div>

<script>

let totalSeconds = 30 * 60;
let elapsed = 0;

const timer = document.getElementById('timer');
const progress = document.getElementById('progress');
const rider = document.getElementById('rider');

let pos = 0;
let direction = 1;

setInterval(function() {
    if (totalSeconds <= 0) {
        timer.innerHTML = "Delivered! 🎉";
        return;
    }
    totalSeconds--;
    elapsed++;
    
    let minutes = Math.floor(totalSeconds / 60);
    let seconds = totalSeconds % 60;
    timer.innerHTML = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    
    let percent = (elapsed / (30*60)) * 100;
    progress.style.width = percent + '%';
    
    pos += direction * 5;
    if (pos > 200 || pos < 0) direction *= -1;
    rider.style.marginLeft = pos + 'px';

}, 1000);
</script>
{% endblock %}
